<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Birth of Music</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        @font-face {
            font-family: "McDonaldsFriesFont";
            src: url('McDonald_s_Fries_Font.ttf') format('truetype');
        }

        @font-face {
            font-family: 'LXGWWenKai-Light';
            src: url('LXGWWenKai-Light.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
            color-scheme: light dark;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000000;
            }
        }

        canvas {
            display: block;
            margin: 0 auto;
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <script>
        let lines = [];
        let musicalLines = [];
        let customFont = 'System';

        // 调色板：参考视觉效果提供红、蓝、绿、金等颜色
        const palettes = ['#D32F2F', '#1976D2', '#388E3C', '#FBC02D', '#7B1FA2', '#E64A19', '#00796B'];

        let isP5Ready = false;
        let pendingText = null;
        let pendingFont = null;
        let fontReady = false;

        // 辅助函数：生成复合正弦波以更平滑
        function compositeWave(y, timeOffset) {
            // 主波：极长波长，控制主要S型走势
            let waveFreq1 = TWO_PI / 1200.0;
            let wave1 = sin(y * waveFreq1 - timeOffset * 0.8) * (width * 0.35);

            // 次波：同样超长波幅，只为了打破绝对对称的生硬感，去除小起伏
            let waveFreq2 = TWO_PI / 1800.0;
            let wave2 = sin(y * waveFreq2 + timeOffset * 0.4) * (width * 0.15);

            return wave1 + wave2;
        }

        class MusicalLine {
            constructor(text, yOffset) {
                this.text = text;
                this.reset(yOffset);
            }

            reset(yOffset = -random(50, 300)) {
                this.y = yOffset;
                this.baseX = width / 2;
                // 更小的字体，视觉更精致
                this.size = random(8, 22);
                this.color = random(palettes);
                // 更快的滚动速度
                this.speed = random(3.0, 7.0);
            }

            update() {
                this.y += this.speed;
                // 滚动到底部以外后，从顶部重新进入
                if (this.y > height + 300) {
                    this.reset();
                }
            }

            draw() {
                push();
                let timeOffset = frameCount * 0.05;

                // 使用复合波动函数
                let waveX = this.baseX + compositeWave(this.y, timeOffset);

                // 计算复合波斜率 (tangent)
                let waveXNext = this.baseX + compositeWave(this.y - 1, timeOffset);
                let dx = waveXNext - waveX;
                let dy = -1;

                // 为了避免复合波切线抖动过于剧烈，可以加一个平滑或限制
                let tangentAngle = atan2(dy, dx) + HALF_PI;
                // 限制旋转角度以免倒挂太严重
                tangentAngle = constrain(tangentAngle, -0.6, 0.6);

                translate(waveX, this.y);
                rotate(tangentAngle);
                fill(this.color);
                textSize(this.size);
                textAlign(CENTER, CENTER);
                drawingContext.globalAlpha = 0.75;
                text(this.text, 0, 0);
                pop();
            }
        }

        function setup() {
            let cw = windowWidth;
            let ch = cw * 4 / 3;
            let availH = windowHeight - 60;
            if (ch > availH) { ch = availH; cw = ch * 3 / 4; }
            createCanvas(cw, ch);
            frameRate(60);
            noStroke();
            isP5Ready = true;
            // Notify Swift that P5.js is ready
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.p5Ready) {
                window.webkit.messageHandlers.p5Ready.postMessage('ready');
            }
            // 如果 Swift 已经发来了文本和字体，启动字体加载流程
            if (pendingText !== null) {
                startArt(pendingText, pendingFont);
                pendingText = null;
                pendingFont = null;
            }
        }

        function draw() {
            // 暖白色背景
            background(253, 252, 250);

            // 字体未就绪时不绘制文字粒子，只画背景曲线
            // 绘制复合曲线背景
            stroke(200, 80);
            strokeWeight(1);
            noFill();
            beginShape();
            let timeOffset = frameCount * 0.05;
            // 为了圆滑曲线，步进稍微小点
            for (let y = 0; y < height; y += 8) {
                let x = width / 2 + compositeWave(y, timeOffset);
                vertex(x, y);
            }
            endShape();
            noStroke();

            if (!fontReady) return;

            for (let ml of musicalLines) {
                ml.update();
                ml.draw();
            }
        }

        function initLines(text) {
            let parsedLines = text.split('\n').filter(l => l.trim().length > 0);
            if (parsedLines.length > 0) {
                lines = parsedLines;
            } else if (lines.length === 0) {
                lines = ['音乐的诞生'];
            }

            musicalLines = [];

            // 粒子数量 = clamp(行数, 100, 150)
            // 行数不足 100 时循环补全；超过 150 时封顶，避免性能下降
            const PARTICLE_COUNT = Math.min(Math.max(lines.length, 100), 150);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let lineText = lines[i % lines.length];
                let yOffset = random(-height, height);
                musicalLines.push(new MusicalLine(lineText, yOffset));
            }
        }

        // SwiftUI 调用的接口
        function notifyTextRendered() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.textRendered) {
                window.webkit.messageHandlers.textRendered.postMessage('done');
            }
        }

        function startArt(text, font) {
            if (!isP5Ready) {
                pendingText = text;
                pendingFont = font;
                return;
            }

            if (font && font !== 'System') {
                customFont = font;
                // 触发字体加载，等待加载完成后再应用和渲染
                document.fonts.load('16px "' + font + '"').then(function () {
                    try { textFont(customFont); } catch (e) { }
                    fontReady = true;
                    initLines(text);
                    notifyTextRendered();
                });
            } else {
                fontReady = true;
                initLines(text);
                notifyTextRendered();
            }
        }

        function windowResized() {
            let cw = windowWidth;
            let ch = cw * 4 / 3;
            let availH = windowHeight - 60;
            if (ch > availH) { ch = availH; cw = ch * 3 / 4; }
            resizeCanvas(cw, ch);
        }

        // 监听点击事件，呼出按钮
        function mousePressed() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.action) {
                window.webkit.messageHandlers.action.postMessage('showActionSheet');
            }
        }

        // --- 录制导出相关 ---
        let mediaRecorder;
        let recordedChunks = [];

        function startRecording() {
            recordedChunks = [];
            const canvas = document.querySelector('canvas');
            // 提升抓取帧率为60
            const stream = canvas.captureStream(60);

            // 增加码率保证高帧率下的清晰度
            let options = { mimeType: 'video/mp4', videoBitsPerSecond: 5000000 };
            if (typeof MediaRecorder !== 'undefined') {
                if (!MediaRecorder.isTypeSupported('video/mp4')) {
                    options = { mimeType: 'video/webm', videoBitsPerSecond: 5000000 };
                }
                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = function (e) {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };
                mediaRecorder.start();
            } else {
                console.error('MediaRecorder API not supported');
            }
        }

        // 此方法返回给 Swift
        function stopRecordingAndGetResult() {
            if (!mediaRecorder) {
                return;
            }
            mediaRecorder.onstop = function () {
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = function () {
                    const base64data = reader.result;
                    // 将 base64 传回给 Swift
                    if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.videoCallback) {
                        window.webkit.messageHandlers.videoCallback.postMessage(base64data);
                    }
                }
            };
            mediaRecorder.stop();
        }
    </script>
</body>

</html>
