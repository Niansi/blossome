<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>麦门</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        @font-face {
            font-family: "McDonaldsFriesFont";
            src: url('McDonald_s_Fries_Font.ttf') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #ffffff;
            color-scheme: light dark;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #000000;
            }
        }

        canvas {
            display: block;
            margin: 0 auto;
            margin-top: 60px;
        }
    </style>
</head>

<body>
    <script>
        // --- Colors ---
        const BOX_CORAL = '#EE806C';
        const BOX_DARK = '#D4604A';
        const FRIES_GOLD = '#FDD466';
        const GOLD_COLORS = ['#FDD466', '#FFC72C', '#FFD54F', '#FFCA28'];

        // --- Timing (frames at 60fps) ---
        const SHAKE_DURATION = 50;
        const FLY_DURATION = 40;
        const SETTLE_DURATION = 50;
        const DISPLAY_DURATION = 120;
        const FALL_DURATION = 50;

        // --- State ---
        let state = 'IDLE';
        let stateTimer = 0;
        let wordParticles = [];
        let wordGroups = [];
        let currentGroupIndex = 0;
        let cssFontName = "McDonaldsFriesFont";

        let isP5Ready = false;
        let pendingText = null;
        let pendingFont = null;
        let fontReady = false;
        let textInitialized = false;

        // Box
        let boxW, boxH, boxX, boxY;
        let shakeIntensity = 0;

        // Decorative fries
        let decoFries = [];
        let goldRGBs = [];

        // ============================
        // Word Particle — one per word
        // ============================
        class WordParticle {
            constructor(word, targetX, targetY, delay) {
                this.word = word;
                this.targetX = targetX;
                this.targetY = targetY;
                this.delay = delay; // staggered launch delay in frames
                this.fontSize = 42;
                this.colorIdx = Math.floor(Math.random() * GOLD_COLORS.length);

                // Start hidden inside box
                this.x = boxX + (Math.random() - 0.5) * boxW * 0.3;
                this.y = boxY - boxH * 0.3;
                this.angle = (Math.random() - 0.5) * 0.6;
                this.alpha = 0;
                this.scale = 0.5;
                
                // Final resting offsets
                this.finalRestingXOffset = (Math.random() - 0.5) * 60; // -30 to +30
                this.finalRestingAngle = (Math.random() - 0.5) * (Math.PI / 6); // -15 to +15 degrees

                // Physics for flying phase
                this.vx = 0;
                this.vy = 0;
                this.launched = false;
                this.settled = false;
            }

            launch() {
                this.launched = true;
                this.alpha = 255;
                
                this.flightTime = 40 + Math.random() * 20; // 40 to 60 frames
                this.flightTimer = 0;
                
                this.startX = this.x;
                this.startY = this.y;
                
                this.endX = this.targetX + this.finalRestingXOffset;
                this.endY = this.targetY;
                
                // 向外且向上的随机控制点，形成喷泉抛物线效果
                let sideDir = (this.endX > boxX) ? 1 : -1; 
                // 增强发散效果
                let outwardX = (width * 0.15 + Math.random() * width * 0.2) * sideDir; 
                
                this.cpX = this.startX + outwardX;
                let minY = Math.min(this.startY, this.endY);
                this.cpY = minY - height * (0.2 + Math.random() * 0.25);
                
                // 旋转圈数：随机方向，至少多转一圈
                this.startAngle = (Math.random() - 0.5) * Math.PI;
                let rotations = (Math.random() > 0.5 ? 1 : -1) * Math.PI * 2;
                this.targetAngle = this.finalRestingAngle + rotations;
                
                this.startScale = 0.5 + Math.random() * 0.2;
            }

            updateFlying() {
                if (!this.launched || this.settled) return;
                
                this.flightTimer++;
                let t = this.flightTimer / this.flightTime;
                
                if (t >= 1.0) {
                    this.x = this.endX;
                    this.y = this.endY;
                    this.angle = this.targetAngle;
                    this.scale = 1.0;
                    this.settled = true;
                } else {
                    // Cubic ease out 计算，提供完美的抛物线着陆感
                    let easeT = 1 - Math.pow(1 - t, 3);
                    let invT = 1 - easeT;
                    
                    // Bezier formula for curve
                    this.x = invT * invT * this.startX + 2 * invT * easeT * this.cpX + easeT * easeT * this.endX;
                    this.y = invT * invT * this.startY + 2 * invT * easeT * this.cpY + easeT * easeT * this.endY;
                    
                    this.angle = this.startAngle + (this.targetAngle - this.startAngle) * easeT;
                    this.scale = this.startScale + (1.0 - this.startScale) * easeT;
                }
            }

            updateSettling() {
                if (!this.launched || this.settled) return;
                // 如果还未落地就进入了 settling 阶段，强制将其吸附在最终点
                this.x = this.endX;
                this.y = this.endY;
                this.angle = this.targetAngle;
                this.scale = 1.0;
                this.settled = true;
            }

            updateDisplay() {
                // 原地轻微晃动
                this.x = this.endX + (Math.random() - 0.5) * 0.4;
                this.y = this.endY + (Math.random() - 0.5) * 0.4;
                this.angle = this.targetAngle; // maintains rotation
                this.scale = 1.0;
            }

            updateFalling(timer) {
                if (timer < 5) {
                    // Initial burst
                    this.vx = (Math.random() - 0.5) * 4;
                    this.vy = -3 - Math.random() * 3;
                }
                this.vy += 0.5;
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.vx * 0.01;
                this.alpha = Math.max(0, this.alpha - 6);
            }

            draw() {
                if (this.alpha <= 0 || !this.launched) return;
                let rgb = goldRGBs[this.colorIdx];
                push();
                translate(this.x, this.y);
                rotate(this.angle);
                scale(this.scale);
                noStroke();
                fill(rgb[0], rgb[1], rgb[2], this.alpha);
                textAlign(CENTER, CENTER);
                textFont(cssFontName);
                textSize(this.fontSize);
                text(this.word, 0, 0);
                pop();
            }
        }

        // ==============
        // Decorative Fry (rigid body particle)
        // ==============
        class DecoFry {
            constructor(isInner) {
                this.isInner = isInner || false;
                // Position as fraction of boxW from center
                this.offsetX = (Math.random() - 0.5) * (this.isInner ? 0.5 : 0.4);
                this.baseAngle = (Math.random() - 0.5) * (this.isInner ? 0.25 : 0.35);
                // Inner fries are shorter, hidden inside box
                this.h = this.isInner ? (0.06 + Math.random() * 0.08) : (0.15 + Math.random() * 0.15);
                this.w = 0.04 + Math.random() * 0.02;
                this.colorIdx = Math.floor(Math.random() * GOLD_COLORS.length);
                this.phase = Math.random() * Math.PI * 2;

                // Curve shape: control point offsets for bezier (fraction of fry height)
                this.curveMid1 = (Math.random() - 0.5) * 0.4;  // lateral bend at 1/3 height
                this.curveMid2 = (Math.random() - 0.5) * 0.3;  // lateral bend at 2/3 height

                // Physics state
                this.vx = 0;
                this.vy = 0;
                this.vAngle = 0;
                this.dynAngle = 0;
                this.dynX = 0;
                this.dynY = 0;
                this.prevShakeX = 0;
                this.prevShakeY = 0;
                // Inner fries start pushed down, pop up during shake
                this.popUp = this.isInner ? 0 : 1; // 0 = hidden, 1 = fully visible
            }

            update(shakeIntensity) {
                if (shakeIntensity < 0.01) {
                    // No shake — keep current position, just damp velocity
                    this.vx *= 0.8;
                    this.vy *= 0.8;
                    this.vAngle *= 0.8;
                    this.prevShakeX = 0;
                    this.prevShakeY = 0;
                    // Inner fries slowly sink back
                    if (this.isInner) {
                        this.popUp = Math.max(0, this.popUp - 0.01);
                    }
                    return;
                }

                // Inner fries pop up during shake
                if (this.isInner) {
                    this.popUp = Math.min(1, this.popUp + 0.05);
                }

                // Box shake acceleration = change in shake displacement
                let curShakeX = sin(frameCount * 0.6) * 2 * shakeIntensity;
                let curShakeY = cos(frameCount * 0.5) * 1 * shakeIntensity;
                let accelX = (curShakeX - this.prevShakeX) * 3.0;
                let accelY = (curShakeY - this.prevShakeY) * 3.0;
                this.prevShakeX = curShakeX;
                this.prevShakeY = curShakeY;

                // Apply inertial force
                this.vx -= accelX * (0.8 + Math.random() * 0.4);
                this.vy -= accelY * (0.8 + Math.random() * 0.4);

                // Random jitter from collisions
                this.vx += (Math.random() - 0.5) * shakeIntensity * 1.5;
                this.vy += (Math.random() - 0.5) * shakeIntensity * 0.8;
                this.vAngle += (Math.random() - 0.5) * shakeIntensity * 0.03;

                // Damping
                this.vx *= 0.75;
                this.vy *= 0.75;
                this.vAngle *= 0.8;

                // Integrate
                this.dynX += this.vx;
                this.dynY += this.vy;
                this.dynAngle += this.vAngle;

                // Bounce off walls
                let maxDX = boxW * 0.12;
                let maxDY = boxH * 0.06;
                let maxAngle = 0.4;
                if (this.dynX > maxDX) { this.dynX = maxDX; this.vx *= -0.5; }
                if (this.dynX < -maxDX) { this.dynX = -maxDX; this.vx *= -0.5; }
                if (this.dynY > maxDY) { this.dynY = maxDY; this.vy *= -0.5; }
                if (this.dynY < -maxDY) { this.dynY = -maxDY; this.vy *= -0.5; }
                this.dynAngle = constrain(this.dynAngle, -maxAngle, maxAngle);
            }

            drawFry(bw, bh, topY) {
                if (this.isInner && this.popUp < 0.02) return;

                this.update(shakeIntensity);
                push();
                let fx = this.offsetX * bw + this.dynX;
                let effectiveH = this.h * bh;
                // Inner fries: slide up/down based on popUp
                let yOff = this.isInner ? topY + effectiveH * (1 - this.popUp) : topY;
                translate(fx, yOff + this.dynY);
                rotate(this.baseAngle + this.dynAngle);
                noStroke();
                let rgb = goldRGBs[this.colorIdx];
                let fw = this.w * bw;
                let fh = effectiveH;

                // Draw curved fry using bezier quad strip
                let halfW = fw / 2;
                let bend1 = this.curveMid1 * fh;
                let bend2 = this.curveMid2 * fh;

                // Main body
                fill(rgb[0], rgb[1], rgb[2]);
                beginShape();
                // Left edge (bottom to top)
                vertex(-halfW, 0);
                bezierVertex(
                    -halfW + bend1, -fh * 0.33,
                    -halfW + bend2, -fh * 0.66,
                    -halfW + bend1 * 0.5 + bend2 * 0.5, -fh
                );
                // Top cap
                vertex(halfW + bend1 * 0.5 + bend2 * 0.5, -fh);
                // Right edge (top to bottom)
                bezierVertex(
                    halfW + bend2, -fh * 0.66,
                    halfW + bend1, -fh * 0.33,
                    halfW, 0
                );
                endShape(CLOSE);

                // Lighter tip (top 22%)
                fill(255, 255, 210, 140);
                beginShape();
                let tipStart = -fh * 0.78;
                let t78 = 0.78;
                let bendAtTip = bend1 * (1 - t78) + bend2 * t78;
                vertex(-halfW + bendAtTip, tipStart);
                bezierVertex(
                    -halfW + bend2, -fh * 0.85,
                    -halfW + bend2 * 0.8 + bend1 * 0.2, -fh * 0.95,
                    -halfW + bend1 * 0.5 + bend2 * 0.5, -fh
                );
                vertex(halfW + bend1 * 0.5 + bend2 * 0.5, -fh);
                bezierVertex(
                    halfW + bend2 * 0.8 + bend1 * 0.2, -fh * 0.95,
                    halfW + bend2, -fh * 0.85,
                    halfW + bendAtTip, tipStart
                );
                endShape(CLOSE);
                pop();
            }
        }

        // ============
        // Box Drawing
        // ============
        // Top edge: flat on left/right 25%, smile curve in center 50%
        function topEdgeCurveY(t, curve) {
            if (t < 0.25 || t > 0.75) return 0;
            let remapped = (t - 0.25) / 0.5;
            return curve * sin(remapped * PI);
        }

        function drawFriesBox() {
            push();
            translate(boxX, boxY);

            // Shake
            let sa = sin(frameCount * 0.4) * 0.02 * shakeIntensity;
            let sx = sin(frameCount * 0.6) * 2 * shakeIntensity;
            let sy = cos(frameCount * 0.5) * 1 * shakeIntensity;
            translate(sx, sy);
            rotate(sa);

            let bw = boxW;
            let bh = boxH;
            let botW = bw * 0.72;
            let topY = -bh * 0.5;
            let botY = bh * 0.22;

            // --- Fries peeking out ---
            for (let df of decoFries) {
                df.drawFry(bw, bh, topY);
            }

            noStroke();

            // --- Box body with curved top (smile) and bottom (frown) ---
            fill(BOX_CORAL);
            beginShape();
            // Bottom edge: frown (sad face) — curves upward in center
            let botCurve = bh * 0.08;
            let steps = 20;
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                let x = lerp(-botW / 2, botW / 2, t);
                // Parabola curving upward (frown shape)
                let curveY = botY - botCurve * sin(t * PI);
                vertex(x, curveY);
            }
            // Right side up to top
            vertex(bw / 2, topY);
            // Top edge: smile (happy face) — flat sides, curves downward in center
            let topCurve = bh * 0.06;
            for (let i = steps; i >= 0; i--) {
                let t = i / steps;
                let x = lerp(-bw / 2, bw / 2, t);
                let curveY = topY + topEdgeCurveY(t, topCurve);
                vertex(x, curveY);
            }
            endShape(CLOSE);

            // Left shadow with matching curves
            fill(BOX_DARK);
            beginShape();
            // Bottom-left portion of frown curve
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                if (t > 0.38) break;
                let x = lerp(-botW / 2, botW / 2, t);
                let curveY = botY - botCurve * sin(t * PI);
                vertex(x, curveY);
            }
            // Straight line up
            vertex(-bw * 0.33, topY + topEdgeCurveY(0.38, topCurve));
            // Top-left portion of smile curve (reversed)
            for (let i = steps; i >= 0; i--) {
                let t = i / steps;
                if (t > 0.38) continue;
                let x = lerp(-bw / 2, bw / 2, t);
                let curveY = topY + topEdgeCurveY(t, topCurve);
                vertex(x, curveY);
            }
            endShape(CLOSE);

            // Top opening band following smile curve
            fill(FRIES_GOLD);
            let bandW = bw * 1.05;
            let bandH = bh * 0.07;
            beginShape();
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                let x = lerp(-bandW / 2, bandW / 2, t);
                let curveY = topY - bandH / 2 + topEdgeCurveY(t, topCurve) * 0.5;
                vertex(x, curveY);
            }
            for (let i = steps; i >= 0; i--) {
                let t = i / steps;
                let x = lerp(-bw / 2, bw / 2, t);
                let curveY = topY + bandH / 2 + topEdgeCurveY(t, topCurve);
                vertex(x, curveY);
            }
            endShape(CLOSE);

            // Bottom rim following frown curve
            fill('#C0483A');
            let rimH = bh * 0.055;
            beginShape();
            for (let i = 0; i <= steps; i++) {
                let t = i / steps;
                let x = lerp(-botW / 2, botW / 2, t);
                let curveY = botY - botCurve * sin(t * PI);
                vertex(x, curveY);
            }
            for (let i = steps; i >= 0; i--) {
                let t = i / steps;
                let x = lerp(-botW * 0.45, botW * 0.45, t);
                let curveY = botY + rimH - botCurve * 0.5 * sin(t * PI);
                vertex(x, curveY);
            }
            endShape(CLOSE);

            // M arches
            drawGoldenArches(0, -bh * 0.04, bw * 0.36, bh * 0.30);

            pop();
        }

        function drawGoldenArches(cx, cy, w, h) {
            push();
            translate(cx, cy);
            noFill();
            stroke(FRIES_GOLD);
            strokeWeight(w * 0.09);
            strokeCap(ROUND);

            beginShape();
            vertex(-w * 0.44, h * 0.35);
            bezierVertex(-w * 0.44, -h * 0.5, -w * 0.11, -h * 0.5, -w * 0.04, h * 0.12);
            endShape();

            beginShape();
            vertex(w * 0.44, h * 0.35);
            bezierVertex(w * 0.44, -h * 0.5, w * 0.11, -h * 0.5, w * 0.04, h * 0.12);
            endShape();

            noStroke();
            pop();
        }

        // ==================
        // Word Group Layout
        // ==================
        function splitIntoGroups(text) {
            let words = text.split(/[\s\n]+/).filter(w => w.trim().length > 0);
            if (words.length === 0) words = ['麦门'];
            let groups = [];
            let i = 0;
            while (i < words.length) {
                let count = Math.floor(Math.random() * 3) + 3; // 3, 4, or 5
                groups.push(words.slice(i, i + count));
                i += count;
            }
            return groups;
        }

        // Compute target positions for a group of words (centered layout)
        function computeTargetPositions(words) {
            let positions = [];
            let n = words.length;
            // Stack words vertically, centered
            let lineH = 65;
            let totalH = n * lineH;
            let startY = height * 0.30 - totalH / 2 + lineH / 2;

            for (let i = 0; i < n; i++) {
                positions.push({
                    x: width / 2,
                    y: startY + i * lineH
                });
            }
            return positions;
        }

        // ==============
        // State Machine
        // ==============
        function transitionTo(newState) {
            state = newState;
            stateTimer = 0;
        }

        function handleState() {
            stateTimer++;

            switch (state) {
                case 'SHAKING':
                    // Intensify shake
                    shakeIntensity = Math.min(stateTimer / 15, 2.5);
                    if (stateTimer >= SHAKE_DURATION) {
                        // Create word particles and launch them
                        let words = wordGroups[currentGroupIndex];
                        let targets = computeTargetPositions(words);
                        wordParticles = [];
                        for (let i = 0; i < words.length; i++) {
                            wordParticles.push(new WordParticle(
                                words[i], targets[i].x, targets[i].y, i * 6
                            ));
                        }
                        transitionTo('FLYING');
                    }
                    break;

                case 'FLYING':
                    shakeIntensity = Math.max(0, 2.5 - stateTimer * 0.08);
                    let allSettled = true;
                    // Stagger launches
                    for (let wp of wordParticles) {
                        if (!wp.launched && stateTimer >= wp.delay) {
                            wp.launch();
                        }
                        wp.updateFlying();
                        if (!wp.settled) allSettled = false;
                    }
                    if (allSettled && stateTimer > 10) {
                        transitionTo('SETTLING');
                    } else if (stateTimer >= 150) { // Timeout fallback
                        transitionTo('SETTLING');
                    }
                    break;

                case 'SETTLING':
                    shakeIntensity = 0;
                    // 仅作短暂等待供最后一丝动画缓动
                    for (let wp of wordParticles) {
                        wp.updateSettling();
                    }
                    if (stateTimer >= 10) {
                        transitionTo('DISPLAY');
                    }
                    break;

                case 'DISPLAY':
                    shakeIntensity = 0;
                    for (let wp of wordParticles) {
                        wp.updateDisplay();
                    }
                    if (stateTimer >= DISPLAY_DURATION) {
                        transitionTo('FALLING');
                    }
                    break;

                case 'FALLING':
                    for (let wp of wordParticles) {
                        wp.updateFalling(stateTimer);
                    }
                    if (stateTimer >= FALL_DURATION) {
                        // Next group
                        currentGroupIndex = (currentGroupIndex + 1) % wordGroups.length;
                        wordParticles = [];
                        transitionTo('SHAKING');
                    }
                    break;
            }
        }

        // ======
        // P5.js
        // ======
        function setup() {
            let cw = windowWidth;
            let ch = cw * 4 / 3;
            let availH = windowHeight - 60;
            if (ch > availH) { ch = availH; cw = ch * 3 / 4; }
            createCanvas(cw, ch);
            frameRate(60);
            noStroke();

            boxW = width * 0.30;
            boxH = boxW * 1.20;
            boxX = width / 2;
            boxY = height * 0.82;

            for (let c of GOLD_COLORS) {
                let col = color(c);
                goldRGBs.push([red(col), green(col), blue(col)]);
            }

            for (let i = 0; i < 10; i++) {
                decoFries.push(new DecoFry(false));
            }
            for (let i = 0; i < 8; i++) {
                decoFries.push(new DecoFry(true));
            }

            isP5Ready = true;

            // Notify Swift that P5.js is ready
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.p5Ready) {
                window.webkit.messageHandlers.p5Ready.postMessage('ready');
            }

            // Load font via CSS @font-face + document.fonts API
            // Same approach as sketch.html which works reliably in WKWebView
            document.fonts.load('28px "' + cssFontName + '"').then(function () {
                fontReady = true;
                try { textFont(cssFontName); } catch (e) { }
                if (pendingText !== null) {
                    doStartArt(pendingText);
                    pendingText = null;
                }
            }).catch(function (err) {
                console.error('CSS font load failed:', err);
                fontReady = true;
                if (pendingText !== null) {
                    doStartArt(pendingText);
                    pendingText = null;
                }
            });
        }

        function draw() {
            background(196, 162, 101);

            // Draw word particles behind box
            for (let wp of wordParticles) {
                wp.draw();
            }

            drawFriesBox();

            if (state !== 'IDLE') {
                handleState();
            }
        }

        function doStartArt(text) {
            wordGroups = splitIntoGroups(text);
            currentGroupIndex = 0;
            wordParticles = [];
            textInitialized = true;
            shakeIntensity = 0;
            transitionTo('SHAKING');
            notifyTextRendered();
        }

        function notifyTextRendered() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.textRendered) {
                window.webkit.messageHandlers.textRendered.postMessage('done');
            }
        }

        // --- Swift API ---
        function startArt(text, font) {
            if (!isP5Ready) {
                pendingText = text;
                pendingFont = font;
                return;
            }

            if (font && font !== 'System') {
                cssFontName = font;
            }

            if (fontReady) {
                doStartArt(text);
            } else {
                pendingText = text;
                pendingFont = font;
            }
        }

        function windowResized() {
            let cw = windowWidth;
            let ch = cw * 4 / 3;
            let availH = windowHeight - 60;
            if (ch > availH) { ch = availH; cw = ch * 3 / 4; }
            resizeCanvas(cw, ch);
            boxW = width * 0.30;
            boxH = boxW * 1.20;
            boxX = width / 2;
            boxY = height * 0.82;
        }

        function mousePressed() {
